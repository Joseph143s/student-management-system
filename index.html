<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Portal - Login</title>
    <!-- 🎨 Connected to Base External Styles -->
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>

<div class="login-card">
    <h2>University Portal</h2>
    <p class="subtitle">Management System Login Workspace</p>

    <div id="errorBox" class="error-msg"></div>

    <form id="loginForm">
        <div class="form-group">
            <label for="email">Institutional Email</label>
            <input type="email" id="email" placeholder="name@university.edu" required />
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit">Sign In</button>
    </form>

    <div class="footer-links">
        Don't have an account? <a href="./register.html">Register here</a>
    </div>
</div>

<!-- 🔌 Connected to Login Logic Script -->
<script type="module" src="./assets/js/login.js"></script>

</body>
</html>
