<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Portal - Create Account</title>
    <!-- 🎨 Connected to Base External Styles -->
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>

<div class="login-card">
    <h2>Account Registration</h2>
    <p class="subtitle">Join the Institutional Workspace</p>

    <div id="errorBox" class="error-msg"></div>

    <form id="registerForm">
        <div class="form-group">
            <label for="regName">Full Name</label>
            <input type="text" id="regName" placeholder="John Doe" required />
        </div>
        <div class="form-group">
            <label for="regEmail">Email Address</label>
            <input type="email" id="regEmail" placeholder="name@university.edu" required />
        </div>
        <div class="form-group">
            <label for="regPassword">Secure Password</label>
            <input type="password" id="regPassword" placeholder="••••••••" minlength="6" required />
        </div>
        <div class="form-group">
            <label for="regRole">Select System Role</label>
            <select id="regRole" required>
                <option value="" disabled selected>-- Select Role --</option>
                <option value="STUDENT">Student</option>
                <option value="FACULTY">Faculty</option>
            </select>
        </div>
        <button type="submit">Register Profile</button>
    </form>

    <div class="footer-links">
        Already registered? <a href="./index.html">Sign In</a>
    </div>
</div>

<!-- 🔌 Connected to Registration Logic Script -->
<script type="module" src="./assets/js/register.js"></script>

</body>
</html>
